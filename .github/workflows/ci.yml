name: CI CD pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set Ruby library path
        run: echo "LD_LIBRARY_PATH=$(ruby -e 'puts RbConfig::CONFIG["libdir"]'):$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set Ruby library path
        run: echo "LD_LIBRARY_PATH=$(ruby -e 'puts RbConfig::CONFIG["libdir"]'):$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set Ruby library path
        run: echo "LD_LIBRARY_PATH=$(ruby -e 'puts RbConfig::CONFIG["libdir"]'):$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Run Rust tests
        run: cargo test

      - name: Build release for Ruby specs
        run: cargo build --release

      - name: Install Ruby dependencies
        run: bundle install

      - name: Run Ruby specs
        run: bundle exec rspec
