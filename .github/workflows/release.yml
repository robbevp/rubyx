name: Release

on:
  push:
    tags: ["v*"]

jobs:
  native-gems:
    name: Build native gem (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - aarch64-linux
          - x86_64-darwin
          - arm64-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      - uses: oxidize-rb/actions/cross-gem@v1
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.1,3.2,3.3,3.4"
      - uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.platform }}
          path: pkg/*.gem

  source-gem:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      - run: gem build rubyx.gemspec
      - uses: actions/upload-artifact@v4
        with:
          name: gem-source
          path: "*.gem"

  publish:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    needs: [native-gems, source-gem]
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: gems
          merge-multiple: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      - uses: rubygems/configure-rubygems-credentials@main
      - name: Publish gems
        run: |
          for gem in gems/*.gem; do
            echo "Publishing $gem..."
            gem push "$gem" || true
          done
